version: '3.8'

services:
  emotion-lens:
    build:
      context: .
      dockerfile: docker/Dockerfile.prod
      args:
        NODE_ENV: production
    container_name: emotion-lens-prod
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      HUME_API_KEY: ${HUME_API_KEY}
      HUME_SECRET_KEY: ${HUME_SECRET_KEY}
    env_file:
      - path: .env
        required: false
      - path: .env.local
        required: false
    restart: always
    healthcheck:
      test: ['CMD', 'node', '-e', 'require("http").get("http://localhost:3000", (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})']
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
