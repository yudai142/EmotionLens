name: リリース - macOS と Windows ビルド

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create_release.outputs.id }}
    steps:
      - name: リリースを作成
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    needs: create-release
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - arch: aarch64
            target: aarch64-apple-darwin
          - arch: x86_64
            target: x86_64-apple-darwin
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Rust をセットアップ
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Node.js をセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: npm 依存関係をインストール
        run: npm install

      - name: Tauri をビルド (macOS ${{ matrix.arch }})
        run: npm run tauri build -- --target ${{ matrix.target }}

      - name: macOS ビルドをリリースにアップロード
        uses: softprops/action-gh-release@v1
        with:
          draft: true
          files: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    needs: create-release
    runs-on: windows-latest
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Rust をセットアップ
        uses: dtolnay/rust-toolchain@stable

      - name: Node.js をセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: npm 依存関係をインストール
        run: npm install

      - name: Tauri をビルド (Windows)
        run: npm run tauri build

      - name: Windows ビルドをリリースにアップロード
        uses: softprops/action-gh-release@v1
        with:
          draft: true
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  finalize-release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: リリースを公開
        uses: softprops/action-gh-release@v1
        with:
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
