name: CI - テストと品質チェック

on:
  push:
    branches: [main, develop, 'feature/**']
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      # 1. リポジトリをチェックアウト
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      # 2. Node.js をセットアップ
      - name: Node.js ${{ matrix.node-version }} をセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      # 3. 依存関係をインストール
      - name: npm 依存関係をインストール
        run: npm ci

      # 4. TypeScript 型チェック
      - name: TypeScript 型チェック
        run: npx tsc --noEmit

      # 5. Jest テストを実行
      - name: Jest テストを実行
        run: npm test -- --coverage --passWithNoTests
        continue-on-error: false

      # 6. テストカバレッジをアップロード（オプション）
      - name: テストカバレッジをコメント
        if: always() && github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7
