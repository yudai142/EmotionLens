services:
  emotion-lens:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    container_name: emotion-lens-dev
    ports:
      - '3000:3000'
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/emotion_lens
    env_file:
      - path: .env.local
        required: false
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: emotion-lens-postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: emotion_lens
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d emotion_lens']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres-data:
