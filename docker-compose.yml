version: '3.9'

services:
  emotion-lens:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    container_name: emotion-lens-dev
    ports:
      - '3000:3000'
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
    env_file:
      - .env.local
    restart: unless-stopped
